services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: ./backend/src/.env
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/santapaciencia.db
      - FRONTEND_PATH=/app/frontend
    volumes:
      - ./data:/app/data
      - ./tokens:/tokens

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: host
    command: tunnel --url http://localhost:3001 --no-autoupdate
    depends_on:
      - backend
