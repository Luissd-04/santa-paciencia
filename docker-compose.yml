services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: ./backend/src/.env
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/santapaciencia.db
      - FRONTEND_PATH=/app/frontend
    volumes:
      - ./data:/app/data      # base de dados + uploads (persistente)
      - ./tokens:/tokens      # token Google Calendar (persistente)
