services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: ./backend/src/.env
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/santapaciencia.db
      - FRONTEND_PATH=/app/frontend
    volumes:
      - ./data:/app/data
      - ./tokens:/tokens
    networks:
      - app-network
    depends_on:
      - cloudflared

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: host
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge